name: Benchmarks

on:
  push:
    branches:
      - main

jobs:
  bench:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -e ".[dev]"
      - name: Run bench_vs_json
        run: python benchmarks/bench_vs_json.py --output benchmarks/results/latest.json
      - name: Upload results artifact
        uses: actions/upload-artifact@v4
        with:
          name: bench-results
          path: benchmarks/results/latest.json
